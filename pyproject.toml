[project]
name = "alphanus"
version = "0.1.2"
description = "Personal on-device AI coding assistant with Textual TUI"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "textual>=0.60",
  "sentence-transformers>=5.2.0",
  "numpy>=2.4.2",
  "PyYAML>=6.0.2",
]

[project.scripts]
alphanus = "alphanus_cli:main"

[project.optional-dependencies]
dev = [
  "pytest>=9.0.2",
  "pytest-mock>=3.15.1",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.setuptools]
package-dir = {"" = "src", "alphanus_bundled" = "skills"}
packages = ["agent", "core", "tui", "alphanus_bundled"]
py-modules = ["alphanus_cli", "alphanus_paths"]

[tool.setuptools.package-data]
alphanus_bundled = ["**/*"]

[tool.uv]
package = true
