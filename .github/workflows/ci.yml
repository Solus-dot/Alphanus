name: CI

on:
  push:
  pull_request:

jobs:
  tests-and-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check src tests bundled-skills tools

      - name: Pyright
        run: uv run pyright

      - name: Tests
        run: uv run pytest
