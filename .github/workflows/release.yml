name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - run: uv build
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
